DEFAULT vesamenu.c32
TIMEOUT 30
PROMPT 0

MENU TITLE SalamOS 2026.1 Boot Menu
MENU BACKGROUND /boot/grub/salamos-grub.png
MENU COLOR title 0 #e0e0e0 #1a1a2e
MENU COLOR sel 7 #e94560 #0f3460
MENU COLOR unsel 0 #e0e0e0 #1a1a2e
MENU COLOR border 0 #0f3460 #1a1a2e

LABEL live
  MENU LABEL SalamOS 2026.1 (Live)
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd boot=live quiet splash hostname=SalamOS username=salamos

LABEL safe
  MENU LABEL SalamOS 2026.1 (Safe Mode)
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd boot=live quiet splash hostname=SalamOS username=salamos nomodeset

LABEL debug
  MENU LABEL SalamOS 2026.1 (Debug Mode)
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd boot=live hostname=SalamOS username=salamos

LABEL reboot
  MENU LABEL Restart
  COM32 reboot.c32

LABEL halt
  MENU_LABEL Shutdown
  COM32 poweroff.c32
