# SalamOS Conky Configuration
# Minimal system monitor on desktop
# ============================================

conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 0,
    color2 = '#0f3460',
    color3 = '#e94560',
    cpu_avg_samples = 2,
    default_color = '#e0e0e0',
    default_outline_color = '#333333',
    default_shade_color = '#333333',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    font = 'Hack:size=9',
    gap_x = 10,
    gap_y = 40,
    minimum_height = 5,
    minimum_width = 200,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    extra_newline = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_colour = '#1a1a2e',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_transparent = false,
    own_window_type = 'desktop',
    stippled_borders = 0,
    update_interval = 2.0,
    uppercase = false,
    use_spacer = 'none',
    show_graph_scale = false,
    show_graph_range = false,
    xinerama_head = 0,
}

conky.text = [[
${color3}SalamOS ${color2}${hr 1}
${color}Host: $nodename
${color}Kernel: $kernel
${color}Uptime: $uptime
${color}RAM: $mem / $memmax ($memperc%)
${color}CPU: $cpu% ${cpubar 4}
${color}Load: $loadavg
${color3}Network ${color2}${hr 1}
${color}Down: ${downspeed eth0} ${color}Up: ${upspeed eth0}
${color3}Processes ${color2}${hr 1}
${color}Total: $processes
${color}Running: $running_processes
${color3}Storage ${color2}${hr 1}
${color}/: ${fs_used /} / ${fs_size /} (${fs_free_perc /}% free)
]]
