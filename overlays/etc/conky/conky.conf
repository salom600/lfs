# SalamOS Conky Configuration - 2026 Modern Edition
# Elegant system monitor with violet accent
# ============================================

conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 0,
    color2 = '#7c3aed',
    color3 = '#e94560',
    color4 = '#648cdc',
    cpu_avg_samples = 2,
    default_color = '#dce6ff',
    default_outline_color = '#0d1123',
    default_shade_color = '#0d1123',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    font = 'Noto Sans:size=9',
    gap_x = 12,
    gap_y = 48,
    minimum_height = 5,
    minimum_width = 220,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    extra_newline = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_colour = '#0d1123',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_transparent = false,
    own_window_type = 'desktop',
    stippled_borders = 0,
    update_interval = 2.0,
    uppercase = false,
    use_spacer = 'none',
    show_graph_scale = false,
    show_graph_range = false,
    xinerama_head = 0,
}

conky.text = [[
${color4}SalamOS 2026.1${color2} ${hr 2}
${color}Host: $nodename
${color}Kernel: $kernel
${color}Uptime: $uptime
${color2}System${color} ${hr 1}
${color}CPU: $cpu% ${cpubar 8,120}
${color}RAM: $mem / $memmax ($memperc%)
${color}Load: $loadavg
${color3}Network${color2} ${hr 1}
${color}Down: ${downspeedf} Kb/s
${color}Up: ${upspeedf} Kb/s
${color4}Storage${color2} ${hr 1}
${color}/: ${fs_used /} / ${fs_size /}
${color}Free: ${fs_free /} (${fs_free_perc /}%)
]]
