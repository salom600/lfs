${color2}${hr 1}${color5}
${font Noto Sans Bold:size=12}${color2}Performance${font}${color5}
${color4}⬤${color5}  CPU:${alignr}${cpu}% ${color2}${cpubar 10,80}
${color4}⬤${color5}  RAM:${alignr}${mem}/${memmax} ${color2}${membar 10,80}
${color4}⬤${color5}  Load:${alignr}${loadavg}
${color2}${hr 1}${color5}
${font Noto Sans Bold:size=12}${color3}Network${font}${color5}
${color4}⬤${color5}  ↓ Down:${alignr}${downspeedf} KB/s
${color4}⬤${color5}  ↑ Up:${alignr}${upspeedf} KB/s
${color2}${hr 1}${color5}
${font Noto Sans Bold:size=12}${color4}Storage${font}${color5}
${color4}⬤${color5}  / Root:${alignr}${fs_used /}/${fs_size /}
${color4}⬤${color5}  Free:${alignr}${fs_free /} (${fs_free_perc /}%)
