# SalamOS Conky - 2026 PROFESSIONAL Edition
# Modern Widget-style system monitor (Windows 11 widgets inspired)
# ============================================

conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 0,
    color2 = '#7c3aed',
    color3 = '#e94560',
    color4 = '#648cdc',
    color5 = '#ffffff',
    cpu_avg_samples = 2,
    default_color = '#dce6ff',
    default_outline_color = '#0d1123',
    default_shade_color = '#0d1123',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    font = 'Noto Sans:size=10',
    gap_x = 16,
    gap_y = 48,
    minimum_height = 5,
    minimum_width = 260,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    extra_newline = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_colour = '#0d1123',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_transparent = false,
    own_window_type = 'desktop',
    stippled_borders = 0,
    update_interval = 1.5,
