# SalamOS LightDM GTK Greeter - 2026 PROFESSIONAL Edition
# Modern Fluent Design login screen
# ============================================

[greeter]
# Theme - Professional 2026
theme-name = SalamOS-Dark
icon-theme-name = Papirus
font-name = Noto Sans 12

# Background - Stunning gradient wallpaper
background = /usr/share/backgrounds/salamos/salamos-wallpaper.png

# User display - Professional avatar
show-user-image = true
default-user-image = /usr/share/pixmaps/salamos-logo.png

# Clock - Modern Windows 11-style time display
clock-format = %H:%M  ·  %A, %d %B %Y

# Layout - Bottom panel like Windows 11
panel-position = bottom
indicators = ~host;~spacer;~clock;~spacer;~language;~session;~a11y;~power

# Session
default-session = openbox

# Anti-aliased text for sharp rendering
anti-aliasing = true

# Window position - Centered, with generous margins
window-position = center

# Window margins - Professional spacing
window-margin-top = 120
window-margin-bottom = 120
window-margin-left = 80
window-margin-right = 80
