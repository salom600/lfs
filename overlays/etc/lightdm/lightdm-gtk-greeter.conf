# SalamOS LightDM GTK Greeter Configuration
# Professional dark theme greeter
# ============================================

[greeter]
# Theme
theme-name = SalamOS-Dark
icon-theme-name = Papirus
font-name = Hack 10

# Background
background = /usr/share/backgrounds/salamos/salamos-wallpaper.png

# User display
show-user-image = true
default-user-image = /usr/share/pixmaps/salamos-logo.png

# Clock
clock-format = %H:%M - %A, %d %B %Y

# Layout
panel-position = bottom
indicators = ~host;~spacer;~clock;~spacer;~language;~session;~a11y;~power

# Session
default-session = openbox

# Login form
login-form = username

# Anti-aliased text
anti-aliasing = true

# Window position
window-position = center

# Window margins
window-margin-top = 50
window-margin-bottom = 50
window-margin-left = 50
window-margin-right = 50
