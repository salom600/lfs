# SalamOS picom compositor configuration
# Lightweight with smooth effects
# ============================================

backend = "xrender";

shadow = true;
shadow-radius = 8;
shadow-opacity = 0.3;
shadow-offset-x = -4;
shadow-offset-y = -4;

# No shadow for certain windows
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "name = 'tint2'",
    "_NET_WM_WINDOW_TYPE@a:32 = '_KDE_NET_WM_WINDOW_TYPE_DESKTOP'"
];

fade = true;
fade-delta = 5;
fade-in-step = 0.06;
fade-out-step = 0.06;

# Opacity rules
opacity-rule = [
    "80:class_g = 'lxterminal'",
    "90:class_g = 'pcmanfm'",
    "90:class_g = 'mousepad'"
];

inactive-opacity = 0.85;
active-opacity = 1.0;

# Unredirect fullscreen windows for performance
unredir-if-possible = true;

# Damage tracking for performance
use-damage = true;

# VSync
vsync = false;

# Mark omen windows
mark-wmwin-focused = true;
mark-ovredir-focused = true;

# Fading override
no-fading-openclose = false;
