# SalamOS picom compositor - 2026 Modern Glassmorphism Edition
# Blur + Shadows + Fading + Rounded corners
# ============================================

# Backend - xrender is lightweight; glx would be better for blur but heavier
backend = "xrender";

# === Blur / Glassmorphism ===
# Enable blur for frosted glass effect on tint2 panel, menus, etc.
blur-method = "dual_kawase";
blur-strength = 5;
# Blur background for specific windows (tint2, menus, etc.)
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
# Rules: which windows get blurred background
blur-background-rule = [
    "class_g = 'tint2'",
    "class_g = 'jgmenu'",
    "class_g = 'dunst'",
    "name = 'tint2'"
];

# === Shadows - Modern soft shadows ===
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.25;
shadow-offset-x = -5;
shadow-offset-y = -5;
# No shadow for panel, conky, desktop
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "name = 'tint2'",
    "_NET_WM_WINDOW_TYPE@a:32 = '_KDE_NET_WM_WINDOW_TYPE_DESKTOP'",
    "class_g = 'jgmenu'"
];

# === Fading - Smooth transitions ===
fade = true;
fade-delta = 6;
fade-in-step = 0.08;
fade-out-step = 0.08;
no-fading-openclose = false;

# === Opacity rules ===
# Terminal at 85% (subtle transparency)
# File manager at 92%
opacity-rule = [
    "85:class_g = 'lxterminal'",
    "92:class_g = 'pcmanfm'",
    "92:class_g = 'mousepad'",
    "90:class_g = 'firefox-esr'",
    "95:class_g = 'gparted'"
];

# Inactive windows slightly dimmed
inactive-opacity = 0.88;
active-opacity = 1.0;

# === Performance ===
# Unredirect fullscreen windows (games benefit from this!)
unredir-if-possible = true;
use-damage = true;
vsync = false;

# === Focus tracking ===
mark-wmwin-focused = true;
mark-ovredir-focused = true;

# === Corner rounding (experimental but modern) ===
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'Conky'",
    "name = 'tint2'"
];
