name: Build SalamOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DISTRO_NAME: "SalamOS"
  DISTRO_VERSION: "2026.1"
  BASE_SUITE: "bookworm"
  BASE_ARCH: "amd64"
  BASE_MIRROR: "http://deb.debian.org/debian"
  DEFAULT_USER: "salamos"
  ISO_NAME: "SalamOS-2026.1-amd64.iso"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get remove -y azure-cli google-chrome-stable firefox 2>/dev/null || true
          sudo apt-get autoremove -y --purge 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap squashfs-tools xorriso isolinux syslinux-common \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed shim-signed \
            mtools dosfstools e2fsprogs parted gdisk fdisk \
            python3-pil systemd-container fakeroot

      - name: Generate SalamOS assets
        run: |
          mkdir -p build/resources
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          BG=(26,26,46); ACCENT=(233,69,96); TEXT=(224,224,224); HEADER=(15,52,96)
          img=Image.new('RGB',(1920,1080),BG); d=ImageDraw.Draw(img)
          for y in range(1080):
              r=y/1080; d.line([(0,y),(1920,y)],fill=(int(BG[0]*(1-r*0.05)),int(BG[1]*(1-r*0.05)),int(BG[2]*(1-r*0.15))))
          d.ellipse([920-80,480-80,920+80,480+80],outline=ACCENT,width=3)
          d.arc([920-56,480-56,920+56,480],180,360,fill=ACCENT,width=4)
          d.arc([920-56,480,920+56,480+56],0,180,fill=ACCENT,width=4)
          d.line([(864,480),(976,480)],fill=TEXT,width=2)
          try: fl=ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf',48); fm=ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf',20); fs=ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf',14)
          except: fl=fm=fs=ImageFont.load_default()
          d.text((860,530),'SalamOS',fill=TEXT,font=fl)
          d.text((800,590),'Ultra-lightweight Professional Linux',fill=HEADER,font=fm)
          d.text((870,620),'2026.1 Zen',fill=ACCENT,font=fs)
          img.save('build/resources/salamos-wallpaper.png')
          img2=Image.new('RGBA',(256,256),(0,0,0,0)); d2=ImageDraw.Draw(img2)
          d2.ellipse([128-60,128-60,128+60,128+60],outline=ACCENT,width=3)
          img2.save('build/resources/salamos-logo.png')
          img3=Image.new('RGB',(640,480),BG); d3=ImageDraw.Draw(img3)
          d3.text((250,240),'SalamOS',fill=TEXT,font=fl)
          img3.save('build/resources/salamos-grub.png')
          print('Assets generated successfully')
          PYEOF

      - name: Write chroot scripts
        run: |
          mkdir -p build/scripts

          # Script 1: chroot-setup.sh
          cat > build/scripts/chroot-setup.sh << 'SEOF'
          #!/bin/bash
          set -e
          export PATH=/usr/sbin:/usr/bin:/sbin:/bin
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          echo "root:root" | chpasswd
          useradd -m -s /bin/bash -G sudo,adm,disk salamos
          echo "salamos:salamos" | chpasswd
          sed -i 's/# en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen
          sed -i 's/# ar_SA.UTF-8 UTF-8/ar_SA.UTF-8 UTF-8/' /etc/locale.gen
          locale-gen
          echo 'LANG=en_US.UTF-8' > /etc/default/locale
          echo 'Africa/Lagos' > /etc/timezone
          ln -sf /usr/share/zoneinfo/Africa/Lagos /etc/localtime
          echo 'salamos ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/salamos
          chmod 440 /etc/sudoers.d/salamos
          echo "Chroot setup done"
          SEOF

          # Script 2: install-packages.sh
          cat > build/scripts/install-packages.sh << 'PEOF'
          #!/bin/bash
          set -e
          export PATH=/usr/sbin:/usr/bin:/sbin:/bin
          export DEBIAN_FRONTEND=noninteractive

          apt-get update

          apt-get install -y --no-install-recommends \
            linux-image-amd64 \
            initramfs-tools \
            live-boot live-boot-initramfs-tools \
            grub2 grub-pc grub-pc-bin \
            firmware-linux-free firmware-misc-nonfree \
            systemd dbus \
            network-manager network-manager-gnome \
            wpasupplicant \
            alsa-utils pulseaudio pulseaudio-utils pavucontrol-qt \
            curl wget ca-certificates \
            openssh-client \
            sudo policykitd ufw \
            xserver-xorg-core xserver-xorg-video-all xserver-xorg-input-all \
            xorg xinit \
            openbox obconf \
            tint2 jgmenu \
            lightdm lightdm-gtk-greeter \
            pcmanfm lxterminal mousepad \
            feh nitrogen picom conky rofi \
            gtk2-engines gtk3-engines-breeze \
            papirus-icon-theme adwaita-icon-theme \
            fonts-liberation fonts-noto fonts-dejavu fonts-hack \
            htop nano vim-tiny \
            file-roller p7zip-full unzip \
            firefox-esr \
            gparted ntfs-3g dosfstools \
            usbutils pciutils lshw \
            acpi acpid upower tlp \
            xdg-utils desktop-file-utils \
            gvfs gvfs-backends udisks2 \
            evince scrot lxappearance

          apt-get install -y --no-install-recommends firefox-esr-l10n-ar 2>/dev/null || true

          apt-get autoremove -y --purge
          apt-get clean
          rm -rf /var/cache/apt/archives/* /var/lib/apt/lists/*

          echo "=== Running update-initramfs ==="
          which update-initramfs || echo "WARNING: update-initramfs not found in PATH"
          ls -la /usr/sbin/update-initramfs 2>/dev/null || echo "WARNING: /usr/sbin/update-initramfs not found"
          /usr/sbin/update-initramfs -u -k all || update-initramfs -u -k all || echo "WARNING: update-initramfs failed, continuing anyway"

          echo "Packages installed"
          PEOF

          # Script 3: customize.sh
          cat > build/scripts/customize.sh << 'CEOF'
          #!/bin/bash
          set -e
          export PATH=/usr/sbin:/usr/bin:/sbin:/bin

          cat > /etc/os-release << 'OEOF'
          NAME="SalamOS"
          VERSION="2026.1 (Zen)"
          ID=salamos
          ID_LIKE=debian
          PRETTY_NAME="SalamOS 2026.1"
          VERSION_ID="2026.1"
          HOME_URL="https://github.com/salom600/lfs"
          SUPPORT_URL="https://github.com/salom600/lfs"
          BUG_REPORT_URL="https://github.com/salom600/lfs/issues"
          VERSION_CODENAME=zen
          DEBIAN_CODENAME=bookworm
          OEOF

          echo 'SalamOS 2026.1' > /etc/issue
          echo 'SalamOS 2026.1' > /etc/issue.net

          cat > /etc/motd << 'MEOF'
          Welcome to SalamOS 2026.1 (Zen)
          Ultra-lightweight professional Linux distribution

          Quick commands:
            update  - Update system
            install - Install packages
            clean   - Clean system
          MEOF

          cat > /home/salamos/.bashrc << 'BEOF'
          export PS1='\u@\h:\w\$ '
          export EDITOR=nano
          export BROWSER=firefox-esr
          alias ll='ls -la'
          alias update='sudo apt-get update && sudo apt-get upgrade'
          alias install='sudo apt-get install'
          alias remove='sudo apt-get remove --purge'
          alias search='apt-cache search'
          alias clean='sudo apt-get autoremove --purge && sudo apt-get clean'
          BEOF
          chown salamos:salamos /home/salamos/.bashrc

          cat > /etc/default/grub << 'GEOF'
          GRUB_DEFAULT=0
          GRUB_TIMEOUT=5
          GRUB_DISTRIBUTOR="SalamOS"
          GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"
          GRUB_CMDLINE_LINUX=""
          GEOF

          systemctl mask apt-daily.service || true
          systemctl mask apt-daily-upgrade.service || true
          systemctl mask apt-daily.timer || true
          systemctl mask apt-daily-upgrade.timer || true
          systemctl mask NetworkManager-wait-online.service || true

          systemctl enable NetworkManager.service || true
          systemctl enable lightdm.service || true
          systemctl enable acpid.service || true
          systemctl enable upower.service || true
          systemctl set-default graphical.target || true

          echo "Customization done"
          CEOF

          # Script 4: desktop-setup.sh
          cat > build/scripts/desktop-setup.sh << 'DEOF'
          #!/bin/bash
          set -e
          export PATH=/usr/sbin:/usr/bin:/sbin:/bin

          mkdir -p /home/salamos/.config/openbox
          mkdir -p /home/salamos/.config/tint2
          mkdir -p /home/salamos/.config/jgmenu
          mkdir -p /home/salamos/.config/nitrogen

          if [ -d /etc/xdg/openbox ]; then
            cp -a /etc/xdg/openbox/* /home/salamos/.config/openbox/
          fi
          if [ -f /etc/tint2/tint2rc ]; then
            cp /etc/tint2/tint2rc /home/salamos/.config/tint2/
          fi

          cat > /home/salamos/.config/nitrogen/nitrogen.cfg << 'NEOF'
          [geometry]
          posx=0
          posy=0
          width=1920
          height=1080

          [Nitrogen]
          wallpaper=/usr/share/backgrounds/salamos/salamos-wallpaper.png
          mode=CENTERED
          NEOF

          mkdir -p /root/.config/nitrogen
          cp /home/salamos/.config/nitrogen/nitrogen.cfg /root/.config/nitrogen/

          chown -R salamos:salamos /home/salamos/.config

          echo 'gtk-theme-name="SalamOS-Dark"' > /home/salamos/.gtkrc-2.0
          echo 'gtk-icon-theme-name="Papirus"' >> /home/salamos/.gtkrc-2.0
          echo 'gtk-font-name="Hack 10"' >> /home/salamos/.gtkrc-2.0
          chown salamos:salamos /home/salamos/.gtkrc-2.0

          mkdir -p /home/salamos/.config/gtk-3.0
          cat > /home/salamos/.config/gtk-3.0/settings.ini << 'GEOF'
          [Settings]
          gtk-theme-name=SalamOS-Dark
          gtk-icon-theme-name=Papirus
          gtk-font-name=Hack 10
          gtk-application-prefer-dark-theme=1
          GEOF
          chown -R salamos:salamos /home/salamos/.config/gtk-3.0

          echo "Desktop setup done"
          DEOF

          # Script 5: cleanup.sh
          cat > build/scripts/cleanup.sh << 'CLEOF'
          #!/bin/bash
          set -e
          export PATH=/usr/sbin:/usr/bin:/sbin:/bin

          rm -rf /usr/share/doc/* /usr/share/info/* /usr/share/man/*

          cp -a /usr/share/locale/en /tmp/locale_en 2>/dev/null || true
          cp -a /usr/share/locale/ar /tmp/locale_ar 2>/dev/null || true
          rm -rf /usr/share/locale/*
          mv /tmp/locale_en /usr/share/locale/en 2>/dev/null || true
          mv /tmp/locale_ar /usr/share/locale/ar 2>/dev/null || true

          rm -rf /var/log/*
          mkdir -p /var/log
          touch /var/log/syslog
          rm -rf /tmp/* /var/tmp/*

          apt-get clean 2>/dev/null || true
          rm -rf /var/cache/apt/archives/* /var/cache/apt/*.bin /var/lib/apt/lists/*
          mkdir -p /var/lib/apt/lists/partial

          dbus-uuidgen > /etc/machine-id 2>/dev/null || true
          cp /etc/machine-id /var/lib/dbus/machine-id 2>/dev/null || true
          printf '' > /etc/machine-id

          dd if=/dev/zero of=/zero.fill bs=1M 2>/dev/null || true
          rm -f /zero.fill

          cat /dev/null > ~/.bash_history 2>/dev/null || true
          cat /dev/null > /home/salamos/.bash_history 2>/dev/null || true

          echo "Cleanup done"
          CLEOF

          chmod +x build/scripts/*.sh

          # Also write apt config (no indentation issues)
          printf 'APT::Install-Recommends "false";\nAPT::Install-Suggests "false";\nAPT::AutoRemove::RecommendsImportant "false";\nAPT::AutoRemove::SuggestsImportant "false";\n' > build/scripts/apt-no-recommends.conf

          # Write apt sources (no indentation)
          printf 'deb http://deb.debian.org/debian bookworm main contrib non-free-firmware\ndeb http://deb.debian.org/debian bookworm-updates main contrib non-free-firmware\ndeb http://deb.debian.org/debian-security bookworm-security main contrib non-free-firmware\n' > build/scripts/sources.list

          # Write keyboard config
          printf 'XKBMODEL="pc105"\nXKBLAYOUT="us,ara"\nXKBOPTIONS="grp:alt_shift_toggle"\n' > build/scripts/keyboard-config

          echo "All chroot scripts written"

      - name: Create base Debian system (debootstrap)
        run: |
          echo "=== Step 1: Debootstrap ==="
          sudo rm -rf build/chroot
          sudo mkdir -p build/chroot
          sudo debootstrap \
            --variant=minbase \
            --arch=${{ env.BASE_ARCH }} \
            --include=systemd,dbus,apt,bash,coreutils,dpkg,passwd,adduser,sudo,locales \
            ${{ env.BASE_SUITE }} \
            build/chroot \
            ${{ env.BASE_MIRROR }}
          echo "Debootstrap completed. Size: $(sudo du -sh build/chroot | cut -f1)"

      - name: Setup chroot environment
        run: |
          echo "=== Step 2: Chroot Setup ==="
          sudo mount --bind /dev build/chroot/dev
          sudo mount --bind /dev/pts build/chroot/dev/pts
          sudo mount --bind /proc build/chroot/proc
          sudo mount --bind /sys build/chroot/sys
          sudo mount --bind /run build/chroot/run

          # Copy pre-written config files (no indentation issues)
          sudo cp build/scripts/sources.list build/chroot/etc/apt/sources.list
          sudo cp build/scripts/apt-no-recommends.conf build/chroot/etc/apt/apt.conf.d/99-no-recommends
          sudo cp /etc/resolv.conf build/chroot/etc/resolv.conf
          echo "SalamOS" | sudo tee build/chroot/etc/hostname > /dev/null
          printf '127.0.0.1       localhost\n127.0.1.1       SalamOS\n::1     localhost ip6-localhost ip6-loopback\n' | sudo tee build/chroot/etc/hosts > /dev/null
          sudo cp build/scripts/keyboard-config build/chroot/etc/default/keyboard

          # Copy and execute chroot-setup script
          sudo cp build/scripts/chroot-setup.sh build/chroot/tmp/chroot-setup.sh
          sudo chroot build/chroot /bin/bash /tmp/chroot-setup.sh
          sudo rm build/chroot/tmp/chroot-setup.sh
          echo "Chroot setup completed"

      - name: Install packages
        run: |
          echo "=== Step 3: Package Installation ==="
          sudo cp build/scripts/install-packages.sh build/chroot/tmp/install-packages.sh
          sudo chroot build/chroot /bin/bash /tmp/install-packages.sh
          sudo rm build/chroot/tmp/install-packages.sh
          echo "Packages installed. Size: $(sudo du -sh build/chroot | cut -f1)"

      - name: Apply SalamOS customizations
        run: |
          echo "=== Step 4: Customization ==="
          sudo cp -a overlays/etc/ build/chroot/etc/ 2>/dev/null || true
          sudo cp -a overlays/usr/ build/chroot/usr/ 2>/dev/null || true
          sudo cp -a overlays/home/ build/chroot/home/ 2>/dev/null || true

          sudo mkdir -p build/chroot/usr/share/backgrounds/salamos
          sudo mkdir -p build/chroot/usr/share/pixmaps
          sudo cp build/resources/salamos-wallpaper.png build/chroot/usr/share/backgrounds/salamos/
          sudo cp build/resources/salamos-logo.png build/chroot/usr/share/pixmaps/

          sudo cp build/scripts/customize.sh build/chroot/tmp/customize.sh
          sudo chroot build/chroot /bin/bash /tmp/customize.sh
          sudo rm build/chroot/tmp/customize.sh
          echo "Customization completed"

      - name: Configure desktop environment
        run: |
          echo "=== Step 5: Desktop Setup ==="
          sudo cp build/scripts/desktop-setup.sh build/chroot/tmp/desktop-setup.sh
          sudo chroot build/chroot /bin/bash /tmp/desktop-setup.sh
          sudo rm build/chroot/tmp/desktop-setup.sh

      - name: Cleanup and optimize
        run: |
          echo "=== Step 6: Cleanup ==="
          sudo cp build/scripts/cleanup.sh build/chroot/tmp/cleanup.sh
          sudo chroot build/chroot /bin/bash /tmp/cleanup.sh
          sudo rm build/chroot/tmp/cleanup.sh
          echo "Cleanup completed. Size: $(sudo du -sh build/chroot | cut -f1)"

      - name: Create squashfs
        run: |
          echo "=== Step 7a: Squashfs ==="
          sudo mkdir -p build/iso/live
          sudo mksquashfs build/chroot build/iso/live/filesystem.squashfs \
            -comp zstd \
            -Xcompression-level 19 \
            -no-progress \
            -e boot/grub
          sudo cp build/chroot/boot/vmlinuz-* build/iso/live/vmlinuz
          sudo cp build/chroot/boot/initrd.img-* build/iso/live/initrd
          echo "Squashfs created. Size: $(sudo du -sh build/iso/live/filesystem.squashfs | cut -f1)"

      - name: Create bootable ISO
        run: |
          echo "=== Step 7b: ISO Creation ==="
          sudo mkdir -p build/iso/boot/grub
          sudo mkdir -p build/iso/EFI/BOOT

          cat > /tmp/grub.cfg << 'GEOF'
          set gfxpayload=keep
          set default=0
          set timeout=5
          insmod all_video
          insmod gfxterm
          insmod png
          insmod part_gpt
          insmod part_msdos
          insmod ext2

          menuentry "SalamOS 2026.1 (Live)" {
            linux /live/vmlinuz boot=live quiet splash hostname=SalamOS username=salamos
            initrd /live/initrd
          }
          menuentry "SalamOS 2026.1 (Live - Safe Mode)" {
            linux /live/vmlinuz boot=live quiet splash hostname=SalamOS username=salamos nomodeset
            initrd /live/initrd
          }
          menuentry "SalamOS 2026.1 (Debug Mode)" {
            linux /live/vmlinuz boot=live hostname=SalamOS username=salamos
            initrd /live/initrd
          }
          menuentry "System Restart" { reboot }
          menuentry "System Shutdown" { halt }
          GEOF
          sudo cp /tmp/grub.cfg build/iso/boot/grub/grub.cfg
          sudo cp build/resources/salamos-grub.png build/iso/boot/grub/

          sudo grub-mkimage -O x86_64-efi \
            -o build/iso/EFI/BOOT/BOOTX64.EFI \
            -p "/boot/grub" \
            all_video boot btrfs cat chain configfile echo efifwsetup \
            efi_gop efi_uga fat font gfxmenu gfxterm gzio hfsplus \
            iso9660 linux loadenv loopback ls lsefi normal part_apple \
            part_msdos part_gpt png read reboot search search_fs_uuid \
            search_fs_file search_label squash4 test true video video_fb xfs

          sudo mkdir -p build/iso/boot/grub/i386-pc
          sudo grub-mkimage -O i386-pc \
            -o build/iso/boot/grub/i386-pc/eltorito.img \
            -p "/boot/grub" \
            biosdisk cdboot chain configfile echo ext2 font gfxmenu gfxterm \
            iso9660 linux ls normal part_msdos part_gpt \
            png reboot search search_fs_uuid squash4 test true video video_fb

          MOD_DATE=$(date +%Y%m%d%H%M%S00)
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -V "SalamOS 2026.1" \
            -publisher "SalamOS Project" \
            -A "SalamOS Live System" \
            --modification-date="${MOD_DATE}" \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -eltorito-boot boot/grub/i386-pc/eltorito.img \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --eltorito-catalog boot/grub/boot.cat \
            --grub2-boot-info \
            --efi-boot EFI/BOOT/BOOTX64.EFI \
            -no-emul-boot \
            --efi-boot-image \
            --protective-msdos-label \
            -output "SalamOS-2026.1-amd64.iso" \
            build/iso

          echo "ISO created successfully!"
          ls -lh SalamOS-2026.1-amd64.iso

      - name: Unmount chroot
        if: always()
        run: |
          sudo umount build/chroot/proc 2>/dev/null || true
          sudo umount build/chroot/sys 2>/dev/null || true
          sudo umount build/chroot/dev/pts 2>/dev/null || true
          sudo umount build/chroot/dev 2>/dev/null || true
          sudo umount build/chroot/run 2>/dev/null || true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: SalamOS-ISO
          path: SalamOS-2026.1-amd64.iso
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2026.1"
          name: "SalamOS 2026.1 (Zen)"
          body: |
            ## SalamOS 2026.1 (Zen)
            Ultra-lightweight professional Linux distribution

            - Based on Debian Bookworm (stable)
            - Openbox WM + tint2 panel (ultra-light desktop)
            - Custom SalamOS Dark theme
            - Target idle RAM: ~150MB | ISO size: < 500MB
            - Arabic + English support

            ### Quick Keys
            Super+A: Menu | Super+R: Launcher | Super+T: Terminal | Super+F: Files | Super+W: Browser

            ### Install
            1. Burn ISO to USB  2. Boot from USB  3. Use GParted to install
          files: |
            SalamOS-2026.1-amd64.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
