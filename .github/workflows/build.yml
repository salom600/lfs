name: Build SalamOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DISTRO_NAME: "SalamOS"
  DISTRO_VERSION: "2026.1"
  BASE_SUITE: "bookworm"
  BASE_ARCH: "amd64"
  BASE_MIRROR: "http://deb.debian.org/debian"
  DEFAULT_USER: "salamos"
  ISO_NAME: "SalamOS-2026.1-amd64.iso"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get remove -y azure-cli google-chrome-stable firefox 2>/dev/null || true
          sudo apt-get autoremove -y --purge 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap squashfs-tools xorriso isolinux syslinux-common \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed shim-signed \
            mtools dosfstools e2fsprogs parted gdisk fdisk \
            python3-pil systemd-container fakeroot rsync lz4 dialog

      - name: Generate SalamOS assets
        run: |
          mkdir -p build/resources
          python3 scripts/generate-salamos-assets.py

      - name: Create base Debian system (debootstrap)
        run: |
          echo "=== Step 1: Debootstrap ==="
          sudo rm -rf build/chroot
          sudo mkdir -p build/chroot
          sudo debootstrap \
            --variant=minbase \
            --arch=${{ env.BASE_ARCH }} \
            --include=systemd,dbus,apt,bash,coreutils,dpkg,passwd,adduser,sudo,locales \
            ${{ env.BASE_SUITE }} \
            build/chroot \
            ${{ env.BASE_MIRROR }}
          echo "Debootstrap completed. Size: $(sudo du -sh build/chroot | cut -f1)"

      - name: Setup chroot environment
        run: |
          echo "=== Step 2: Chroot Setup ==="
          sudo mount --bind /dev build/chroot/dev
          sudo mount --bind /dev/pts build/chroot/dev/pts
          sudo mount --bind /proc build/chroot/proc
          sudo mount --bind /sys build/chroot/sys
          sudo mount --bind /run build/chroot/run

          # Copy config files into chroot
          sudo cp scripts/chroot/apt-sources.list build/chroot/etc/apt/sources.list
          sudo cp scripts/chroot/apt-no-recommends.conf build/chroot/etc/apt/apt.conf.d/99-no-recommends
          sudo cp /etc/resolv.conf build/chroot/etc/resolv.conf
          echo "SalamOS" | sudo tee build/chroot/etc/hostname > /dev/null
          printf '127.0.0.1       localhost\n127.0.1.1       SalamOS\n::1     localhost ip6-localhost ip6-loopback\n' | sudo tee build/chroot/etc/hosts > /dev/null

          # Copy and execute chroot-setup script
          sudo cp scripts/chroot/chroot-setup.sh build/chroot/tmp/chroot-setup.sh
          sudo chroot build/chroot /bin/bash /tmp/chroot-setup.sh
          sudo rm -f build/chroot/tmp/chroot-setup.sh 2>/dev/null || true
          echo "Chroot setup completed"

      - name: Install packages
        run: |
          echo "=== Step 3: Package Installation ==="
          sudo cp scripts/chroot/install-packages.sh build/chroot/tmp/install-packages.sh
          sudo chroot build/chroot /bin/bash /tmp/install-packages.sh
          sudo rm -f build/chroot/tmp/install-packages.sh 2>/dev/null || true
          echo "Packages installed. Size: $(sudo du -sh build/chroot | cut -f1)"

      - name: Apply SalamOS customizations
        run: |
          echo "=== Step 4: Customization ==="
          # Use rsync to properly merge overlays into chroot (cp -a creates nested usr/usr/)
          sudo rsync -a overlays/etc/ build/chroot/etc/
          sudo rsync -a overlays/usr/ build/chroot/usr/
          sudo rsync -a overlays/home/ build/chroot/home/ 2>/dev/null || true

          sudo mkdir -p build/chroot/usr/share/backgrounds/salamos
          sudo mkdir -p build/chroot/usr/share/pixmaps
          sudo cp build/resources/salamos-wallpaper.png build/chroot/usr/share/backgrounds/salamos/
          sudo cp build/resources/salamos-logo.png build/chroot/usr/share/pixmaps/

          sudo cp scripts/chroot/customize.sh build/chroot/tmp/customize.sh
          sudo chroot build/chroot /bin/bash /tmp/customize.sh
          sudo rm -f build/chroot/tmp/customize.sh 2>/dev/null || true
          echo "Customization completed"

      - name: Configure desktop environment
        run: |
          echo "=== Step 5: Desktop Setup ==="
          sudo cp scripts/chroot/desktop-setup.sh build/chroot/tmp/desktop-setup.sh
          sudo chroot build/chroot /bin/bash /tmp/desktop-setup.sh
          sudo rm -f build/chroot/tmp/desktop-setup.sh 2>/dev/null || true

      - name: Cleanup and optimize
        run: |
          echo "=== Step 6: Cleanup ==="
          sudo cp scripts/chroot/cleanup.sh build/chroot/tmp/cleanup.sh
          sudo chroot build/chroot /bin/bash /tmp/cleanup.sh
          sudo rm -f build/chroot/tmp/cleanup.sh 2>/dev/null || true
          echo "Cleanup completed. Size: $(sudo du -sh build/chroot | cut -f1)"

      - name: Unmount chroot filesystems
        run: |
          echo "=== Unmounting virtual filesystems from chroot ==="
          sudo umount build/chroot/proc 2>/dev/null || true
          sudo umount build/chroot/sys 2>/dev/null || true
          sudo umount build/chroot/dev/pts 2>/dev/null || true
          sudo umount build/chroot/dev 2>/dev/null || true
          sudo umount build/chroot/run 2>/dev/null || true
          echo "Virtual filesystems unmounted. Chroot is clean for squashfs."

      - name: Create squashfs
        run: |
          echo "=== Step 7a: Squashfs ==="
          sudo mkdir -p build/iso/live
          sudo mksquashfs build/chroot build/iso/live/filesystem.squashfs \
            -comp lz4 \
            -Xhc \
            -no-progress \
            -processors $(nproc) \
            -e boot/grub
          sudo cp build/chroot/boot/vmlinuz-* build/iso/live/vmlinuz
          sudo cp build/chroot/boot/initrd.img-* build/iso/live/initrd
          echo "Squashfs created. Size: $(sudo du -sh build/iso/live/filesystem.squashfs | cut -f1)"

      - name: Create bootable ISO (BIOS + UEFI)
        run: |
          echo "=== Step 7b: ISO Creation ==="

          # ============================================
          # ISOLINUX for BIOS boot (legacy)
          # ============================================
          sudo mkdir -p build/iso/isolinux
          sudo cp /usr/lib/ISOLINUX/isolinux.bin build/iso/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/ldlinux.c32 build/iso/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/vesamenu.c32 build/iso/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/reboot.c32 build/iso/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/poweroff.c32 build/iso/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/libcom32.c32 build/iso/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/libutil.c32 build/iso/isolinux/
          sudo cp scripts/chroot/isolinux.cfg build/iso/isolinux/isolinux.cfg
          sudo cp build/resources/salamos-grub.png build/iso/isolinux/background.png

          # ============================================
          # GRUB config for UEFI boot (on ISO filesystem)
          # ============================================
          sudo mkdir -p build/iso/boot/grub
          sudo cp scripts/chroot/grub.cfg build/iso/boot/grub/grub.cfg
          sudo cp build/resources/salamos-grub.png build/iso/boot/grub/

          # ============================================
          # Create EFI System Partition (ESP) image
          # ============================================
          echo "Creating EFI System Partition image..."

          ESP_SIZE=8  # 8MB for EFI boot files + GRUB modules
          ESP_IMG="build/iso/esp.img"  # Must be INSIDE the ISO directory for xorriso -e

          # Create FAT12 image (build/iso owned by root from previous sudo steps)
          sudo dd if=/dev/zero of="$ESP_IMG" bs=1M count=$ESP_SIZE
          sudo mkfs.vfat -F 12 "$ESP_IMG"

          # Mount ESP image and populate it
          sudo mkdir -p /mnt/esp
          sudo mount -o loop "$ESP_IMG" /mnt/esp

          sudo mkdir -p /mnt/esp/EFI/BOOT
          sudo mkdir -p /mnt/esp/boot/grub

          # Use separate grub-early.cfg file (avoids YAML heredoc parsing issues with { })
          GRUB_CFG_EARLY="scripts/chroot/grub-early.cfg"

          # Build GRUB standalone EFI image with embedded early config
          sudo grub-mkimage -O x86_64-efi \
            -o /mnt/esp/EFI/BOOT/BOOTX64.EFI \
            -p "/boot/grub" \
            -c "$GRUB_CFG_EARLY" \
            all_video boot btrfs cat chain configfile echo efifwsetup efi_gop \
            efi_uga fat font gfxmenu gfxterm gzio hfsplus iso9660 linux \
            loadenv loopback ls lsefi normal part_apple part_msdos part_gpt \
            png read reboot search search_fs_uuid search_fs_file search_label \
            squash4 test true video video_fb xfs

          # Also copy grub.cfg and wallpaper to ESP for fallback
          sudo cp scripts/chroot/grub.cfg /mnt/esp/boot/grub/grub.cfg
          sudo cp build/resources/salamos-grub.png /mnt/esp/boot/grub/salamos-grub.png

          # Also make EFI boot files visible in ISO filesystem tree
          # (xorriso warns about missing /EFI/BOOT directory; improves UEFI USB stick compat)
          sudo mkdir -p build/iso/EFI/BOOT
          sudo cp /mnt/esp/EFI/BOOT/BOOTX64.EFI build/iso/EFI/BOOT/

          sudo umount /mnt/esp
          sudo rm -rf /mnt/esp

          echo "EFI System Partition image created"
          ls -lh "$ESP_IMG"

          # ============================================
          # Create hybrid ISO: ISOLINUX(BIOS) + ESP(UEFI)
          # ============================================
          MOD_DATE=$(date +%Y%m%d%H%M%S00)
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -V "SALAMOS_2026_1" \
            -publisher "SalamOS Project" \
            -A "SalamOS 2026.1 Live System" \
            --modification-date="${MOD_DATE}" \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -eltorito-boot isolinux/isolinux.bin \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --eltorito-catalog isolinux/boot.cat \
            -eltorito-alt-boot \
            -e esp.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
            -append_partition 2 0xef build/iso/esp.img \
            -partition_offset 16 \
            -output "SalamOS-2026.1-amd64.iso" \
            build/iso

          echo "ISO created successfully!"
          ls -lh SalamOS-2026.1-amd64.iso

      - name: Unmount chroot
        if: always()
        run: |
          sudo umount build/chroot/proc 2>/dev/null || true
          sudo umount build/chroot/sys 2>/dev/null || true
          sudo umount build/chroot/dev/pts 2>/dev/null || true
          sudo umount build/chroot/dev 2>/dev/null || true
          sudo umount build/chroot/run 2>/dev/null || true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: SalamOS-ISO
          path: SalamOS-2026.1-amd64.iso
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2026.1"
          name: "SalamOS 2026.1 (Zen)"
          body: |
            ## SalamOS 2026.1 (Zen)
            Ultra-lightweight professional Linux distribution

            - Based on Debian Bookworm (stable)
            - Openbox WM + tint2 panel (ultra-light desktop)
            - Modern 2026 glassmorphism design with SalamOS Dark theme
            - Vibrant gradient wallpaper with flowing waves
            - Target idle RAM: ~150MB | ISO size: < 500MB
            - Arabic + English support
            - One-click software install (Software Center + Synaptic + GDebi)
            - UEFI + BIOS boot support

            ### Quick Keys
            Super+A: Start Menu | Super+R: App Launcher | Super+T: Terminal | Super+F: Files | Super+W: Browser

            ### Install
            1. Burn ISO to USB  2. Boot from USB  3. Double-click "Install SalamOS" on desktop
          files: |
            SalamOS-2026.1-amd64.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
